---
# .ansible/variables-example.yml
# Use the variables.yml file to override these values.
# Keep the list in lexical order for easier maintenance.
apt:
  install:
    - 7zip
    - ansible-lint
    - aria2
    - athena-jot  # Print sequential or random data.
    - btrfs-progs
    - build-essential
    - cargo
    - cifs-utils  # The SMB/CIFS protocol for cross-platform file sharing.
    - coreutils
    - cpuid
    - curl
    - extundelete
    - fdupes
    - ffmpeg
    - figlet
    - findutils
    - gawk
    - gdb
    - gh
    - git
    - git-lfs
    - golang-github-dcso-bloom-cli  # Highly efficient bloom filter implementation for Go (DCSO/bloom).
    - gpg
    - gzip
    - hashcat
    - htop
    - iotop
    - john
    - libhyperscan-dev
    - libicu-dev
    - libpcre2-dev
    - libssl-dev
    - libvirt-clients
    - libzstd-dev
    - lz4
    - mawk
    - mkisofs
    - net-tools  # ifconfig
    - nodejs
    - npm
    - p7zip
    - parallel
    - pipenv
    - plocate  # locate, updatedb
    - poppler-utils
    - pre-commit
    - python3-pip
    - pv
    - rename
    - screen
    - sed
    - speedtest-cli
    - sqlite3
    - testdisk
    - time
    - tmux
    - transmission
    - ugrep
    - unrar
    - unzip
    - vim
    - vlc
    - wget
    - zstd
  releases:
    brave: true
    code: true
    mega: true  # MEGA CMD and Desktop App (https://mega.io/desktop & https://mega.io/cmd)
    protonvpn: true
  upgrade: true

deno: true

# List of files and directories to symlink into the home directory.
dotfiles:
  dirs:
    .ssh: true
    .vim: true
  files:
    .aliasesrc: true
    .aliasesrc_linux: true
    .aliasesrc_macos: true
    .aliasesrc_rg: true
    .bash_aliases: true
    .bash_completion: true
    .bash_exports: true
    .bash_exports_linux: true
    .bash_exports_macos: true
    .bash_logout: true
    .bash_options: true
    .bash_profile: true
    .bashrc: true
    .codespellrc: true
    .ctags: true
    .curlrc: true
    .editorconfig: true
    .eget.toml: true
    .exportsrc: true
    .functions_unicode: true
    .functionsrc: true
    .gdbinit: true
    .gitconfig: true
    .gitignore: true
    .htaccess: true
    .hyper.js: true
    .inputrc: true
    .iterm2_shell_integration.zsh: true
    .lldbinit: true
    .lycheeignore: true
    .markdownlint.yaml: true
    .mdlrc: true
    .my.cnf: true
    .netrc: true
    .npmrc: true
    .pre-commit-config.yaml: true
    .profile: true
    .screenrc: true
    .terraformrc: true
    .torrc: true
    .trafshow: true
    .vimrc: true
    .wgetrc: true
    .yamllint: true
    .zprofile: true
    .zshrc: true

eget: true
eget_packages:
  - alpha-miner  # Fastest Available Pearl Mining Software (AlphaMine-Tech/alpha-miner)
  - bat          # A cat(1) clone with wings (sharkdp/bat)
  - btop         # Resource monitor that shows usage and stats (aristocratos/btop)
  - duf          # Disk Usage/Free Utility - a better 'df' (muesli/duf)
  - eza          # A modern, maintained replacement for 'ls' (eza-community/eza)
  - fd           # A simple, fast and user-friendly alternative to 'find' (sharkdp/fd)
  - jq           # Command-line JSON processor (jqlang/jq)
  - oyster       # Pearl Wallet management (pearl-research-labs/pearl)
  - pandoc       # Universal markup converter (jgm/pandoc)
  - pearld       # Pearl Full node (pearl-research-labs/pearl)
  - prlctl       # Pearl Control utility (pearl-research-labs/pearl)
  - rg           # ripgrep recursively searches directories for a regex pattern (BurntSushi/ripgrep)
  - rga          # ripgrep, but also search in PDFs, E-Books, Office documents, zip, tar.gz, etc. (phiresky/ripgrep-all)
  - tealdeer     # A fast tldr client written in Rust (dbrgn/tealdeer)
  - vale         # A syntax-aware linter for prose (errata-ai/vale)
  - yq           # Portable command-line YAML, JSON, XML, CSV, TOML and properties processor (mikefarah/yq)

nvidia:
  cuda_toolkit: true
  cuda_toolkit_package: cuda-toolkit-13-1
