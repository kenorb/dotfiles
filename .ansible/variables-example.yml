---
# .ansible/variables-example.yml
# Use the variables.yml file to override these values.
# Keep the list in lexical order for easier maintenance.
apt:
  install:
    - 7zip
    - btop
    - btrfs-progs
    - coreutils
    - figlet
    - findutils
    - gh
    - git
    - git-lfs
    - htop
    - iotop
    - libhyperscan-dev
    - libicu-dev
    - libpcre2-dev
    - libssl-dev
    - libvirt-clients
    - libzstd-dev
    - lz4
    - mawk
    - net-tools  # ifconfig
    - pipenv
    - plocate  # locate, updatedb
    - python3-pip
    - pv
    - screen
    - sed
    - speedtest-cli
    - sqlite3
    - time
    - unrar
    - vim
    - zstd
  releases:
    brave: true
    code: true
  upgrade: true

nvidia:
  cuda_toolkit: true
