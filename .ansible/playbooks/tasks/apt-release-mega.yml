---
# Install MEGA Desktop App & MEGA CMD.
# @see: <https://mega.io/cmd>
# @see: <https://mega.io/desktop>
- name: Ensure OS is Ubuntu for MEGA
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] == 'Ubuntu'
    fail_msg: MEGA installation is currently only supported on Ubuntu.

- name: Determine architecture for MEGA
  ansible.builtin.set_fact:
    mega_arch: >-
      {{
        'amd64' if ansible_facts['architecture'] == 'x86_64' else
        'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else
        omit
      }}

- name: Fail on unsupported architecture for MEGA
  ansible.builtin.assert:
    that:
      - mega_arch is defined
    fail_msg: "MEGA installation is not supported on architecture: {{ ansible_facts['architecture'] }}"

- name: Set MEGA download URLs
  ansible.builtin.set_fact:
    mega_deb_url: >-
      {{ 'https://mega.nz/linux/repo/xUbuntu_' ~ ansible_facts['distribution_version'] ~
      '/' ~ mega_arch ~ '/megasync-xUbuntu_' ~ ansible_facts['distribution_version'] ~
      '_' ~ mega_arch ~ '.deb' }}
    megacmd_deb_url: >-
      {{ 'https://mega.nz/linux/repo/xUbuntu_' ~ ansible_facts['distribution_version'] ~
      '/' ~ mega_arch ~ '/megacmd-xUbuntu_' ~ ansible_facts['distribution_version'] ~
      '_' ~ mega_arch ~ '.deb' }}

- name: Download MEGA desktop app package
  ansible.builtin.get_url:
    url: "{{ mega_deb_url }}"
    dest: /tmp/megasync.deb
    mode: '0644'

- name: Download MEGA CMD package
  ansible.builtin.get_url:
    url: "{{ megacmd_deb_url }}"
    dest: /tmp/megacmd.deb
    mode: '0644'

- name: Install MEGA desktop app package
  ansible.builtin.apt:
    deb: /tmp/megasync.deb
    state: present

- name: Install MEGA CMD package
  ansible.builtin.apt:
    deb: /tmp/megacmd.deb
    state: present
