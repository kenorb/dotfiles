---
- name: Install dependencies for VS Code
  ansible.builtin.apt:
    name:
      - wget
      - gpg
      - apt-transport-https
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Microsoft GPG key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/packages.microsoft.asc
    mode: '0644'

- name: Dearmor Microsoft GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/packages.microsoft.gpg /etc/apt/keyrings/packages.microsoft.asc
    creates: /etc/apt/keyrings/packages.microsoft.gpg

- name: Add VS Code repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64,arm64,armhf signed-by=/etc/apt/keyrings/packages.microsoft.gpg]
      https://packages.microsoft.com/repos/code stable main
    filename: vscode
    state: present

- name: Install VS Code
  ansible.builtin.apt:
    name: code
    state: present
    update_cache: true
