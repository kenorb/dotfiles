; Config file for Ansible.
; @docs: https://docs.ansible.com/ansible/latest/reference_appendices/config.html
[defaults]
# Do not inject facts as variables (fixes deprecation warning for Ansible 2.24)
inject_facts_as_vars = False
# Suppress interpreter discovery warnings
interpreter_python = auto_silent
# Use the stdout_callback when running ad-hoc commands.
bin_ansible_callbacks = True
# Leave the 'cows' alone!
nocows = 1
# Increase connection setup timeout for slow or intermittently reachable hosts.
timeout = 60
# Use the built-in default callback with YAML format
stdout_callback = ansible.builtin.default
callback_result_format = yaml

[connection]
# Retry failed SSH connection attempts.
retries = 3

[ssh_connection]
# Retry and wait longer before failing SSH connection establishment.
retries = 3
timeout = 60

[diff]
# Always print diff when running (same as always running with -D/--diff).
always = True
