---
# Docs:
# - <https://github.com/Cogni-AI-OU/cogni-ai-agent-action>
# - <https://opencode.ai/docs>
name: Cogni AI Agent
# yamllint disable-line rule:truthy
run-name: >-
  Agent on  #${{
    github.event.issue.number
    || github.event.pull_request.number
    || github.event.discussion.number
    || github.run_id
  }}
on:
  issue_comment:
    types:
      - created
      - edited
  pull_request_review_comment:
    types:
      - created
      - edited
  discussion:
    types:
      - created
      - edited
      - answered
  discussion_comment:
    types:
      - created
      - edited
  issues:
    types:
      - opened
      - edited
  workflow_call:
    inputs:
      agent:
        default: cogni-ai-architect
        description: Agent to use.
        required: false
        type: string
      model:
        default: ${{ vars.OPENCODE_MODEL_DEFAULT || 'opencode/gemini-3-flash' }}
        description: Model to use for OpenCode
        required: false
        type: string
      prompt:
        default: ''
        description: Custom prompt to override the default prompt
        required: false
        type: string
      version_agents:
        default: main
        description: Version of cogni-ai-agents to use.
        required: false
        type: string
      version_instructions:
        default: main
        description: Version of cogni-ai-agent-instructions to use.
        required: false
        type: string
      version_skills:
        default: main
        description: Version of cogni-ai-agent-skills to use.
        required: false
        type: string
  workflow_dispatch:
    inputs:
      agent:
        default: cogni-ai-architect
        description: Agent to use.
        options:
          - cogni-ai-architect
          - cogni-ai-brain-ops
          - cogni-ai-code-reviewer
          - cogni-ai-devops
          - cogni-ai-manager
          - cogni-ai-plan-reviewer
          - default
        required: false
        type: choice
      model:
        default: opencode/gemini-3-flash
        description: Model to use for OpenCode
        options:
          - opencode/big-pickle
          - opencode/claude-3-5-haiku
          - opencode/claude-haiku-4-5
          - opencode/claude-opus-4-1
          - opencode/claude-opus-4-5
          - opencode/claude-opus-4-6
          - opencode/claude-sonnet-4
          - opencode/claude-sonnet-4-5
          - opencode/claude-sonnet-4-6
          - opencode/deepseek-v4-flash-free
          - opencode/gemini-3.1-pro
          - opencode/gemini-3-flash
          - opencode/glm-4.6
          - opencode/glm-4.7-free
          - opencode/glm-5
          - opencode/glm-5.1
          - opencode/gpt-5
          - opencode/gpt-5-codex
          - opencode/gpt-5-nano
          - opencode/gpt-5.1
          - opencode/gpt-5.1-codex
          - opencode/gpt-5.1-codex-max
          - opencode/gpt-5.1-codex-mini
          - opencode/gpt-5.2
          - opencode/gpt-5.2-codex
          - opencode/gpt-5.3-codex
          - opencode/gpt-5.3-codex-spark
          - opencode/gpt-5.4
          - opencode/gpt-5.4-mini
          - opencode/gpt-5.4-nano
          - opencode/gpt-5.4-pro
          - opencode/grok-code
          - opencode/kimi-k2
          - opencode/kimi-k2-thinking
          - opencode/kimi-k2.5
          - opencode/minimax-m2.1-free
          - opencode/minimax-m2.5
          - opencode/minimax-m2.5-free
          - opencode/nemotron-3-super-free
          - opencode/qwen3.6-plus
          - opencode/qwen3.5-plus
          # Grok models (xAI)
          - xai/grok-4-1-fast-non-reasoning  # Fast responses, 2M context
          - xai/grok-4-1-fast-reasoning  # Tool-calling + reasoning, 2M context
          - xai/grok-4.20-0309-non-reasoning  # Flagship, 2M context
          - xai/grok-4.20-0309-reasoning  # Flagship + reasoning, 2M context
          - xai/grok-code-fast-1  # Agentic coding + reasoning, 256K context
        required: false
        type: choice
      prompt:
        description: Custom prompt to override the default prompt
        required: false
        default: ''
env:
  GITHUB_REF_RESOLVED: >-
    ${{
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        format('refs/pull/{0}/head', github.event.issue.number)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        format('refs/pull/{0}/head', github.event.pull_request.number)
      ) ||
      github.ref
    }}
  OPENCODE_AGENT_DEFAULT: cogni-ai-architect
  OPENCODE_MODEL_DEFAULT: opencode/gemini-3-flash
jobs:
  cogni-ai:
    name: Cogni AI Agent
    outputs:
      run: ${{ steps.cogni-ai.outputs.run }}
    # Note: These are pre-run conditions, actual trigger conditions are defined within the action it-self.
    if: |
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'workflow_call' ||
        github.event.sender.type != 'Bot'
      ) &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'workflow_call' ||
        contains(
          github.event.comment.body ||
          github.event.issue.body ||
          github.event.pull_request.body ||
          github.event.discussion.body ||
          '',
          '/'
        ) ||
        contains(
          github.event.comment.body ||
          github.event.issue.body ||
          github.event.pull_request.body ||
          github.event.discussion.body ||
          '',
          '@'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      discussions: read
      id-token: write  # Needed so opencode can request an OIDC token for GitHub API calls
      issues: write
      models: read
      packages: read
      pull-requests: write
    steps:
      # See: <https://github.com/actions/checkout>
      - uses: actions/checkout@v6
        with:
          persist-credentials: false  # Prevents duplicate Authorization header
          ref: ${{ env.GITHUB_REF_RESOLVED }}
      - uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit|
      - uses: actions/setup-python@v6.2.0
        with:
          cache: >-
            ${{ hashFiles('.devcontainer/requirements.txt', 'requirements.txt',
            '**/pyproject.toml') != '' && 'pip' || '' }}
          cache-dependency-path: |
            .devcontainer/requirements.txt
            requirements.txt
            **/pyproject.toml
          python-version: '3.12'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Install dependencies
        run: |
          if [ -f .devcontainer/requirements.txt ]; then
            pip install -r .devcontainer/requirements.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      - name: Run Cogni AI Agent
        id: cogni-ai
        uses: Cogni-AI-OU/cogni-ai-agent-action@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          agent: >-
            ${{ inputs.agent || '' }}
          model: ${{ inputs.model || env.OPENCODE_MODEL_DEFAULT }}
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}
          prompt: >-
            ${{
              inputs.prompt ||
              github.event.comment.body ||
              github.event.issue.body ||
              github.event.pull_request.body ||
              github.event.discussion.body
            }}
          version_agents: ${{ inputs.version_agents || 'main' }}
          version_instructions: ${{ inputs.version_instructions || 'main' }}
          version_skills: ${{ inputs.version_skills || 'main' }}
  summary:
    name: Generate Summary (post-run)
    needs: cogni-ai
    if: always() && needs.cogni-ai.result != 'skipped' && needs.cogni-ai.outputs.run == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      models: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ env.GITHUB_REF_RESOLVED }}
      - name: Generate Summary
        uses: Cogni-AI-OU/cogni-ai-agent-action/ai-inference/summary@main
        with:
          agent_job_id: cogni-ai
          github_token: ${{ secrets.GITHUB_TOKEN }}
